; NextGen Disk Cache 2.0.0 - EXPERIMENTAL
;
; UNPROVEN. Benchmark it against the Safe profile before keeping it; if you do
; not measure a difference, use Safe. Everything enabled here is opt-in because
; it is either wider in scope or has no demonstrated gameplay benefit:
;
;   iHookScope=1               process-WIDE hook. File opens made by OTHER SKSE
;                              plugins pass through this plugin's policy. The
;                              policy declines almost all of them, but this is
;                              a real compatibility surface, not a free win.
;   bEnableWarmCache=1         speculative prefetch. It cannot know which
;                              archives your save actually needs, and background
;                              disk activity is a plausible microstutter source.
;   bDisablePowerThrottling=1  opts the whole process out of EcoQoS throttling.
;                              Process-scoped and safe for other mods, but it is
;                              a scheduling policy choice, not a cache improvement.
;
; DirectStorage stays off even here: its raw-read path fills scratch memory and
; discards it, which does not populate the Windows cache Skyrim reads from.

[FileCache]
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
; 1 = process-wide Detours. This is the experimental part.
iHookScope=1
bStripNoBuffering=1
bConservativeHookScope=1
bPreferRandomAccessOnArchives=1
bLeaveSequentialOnLogs=1

[Process]
bDisablePowerThrottling=1
; Still off: MEMORY_PRIORITY_NORMAL is already the Windows default.
bRaiseMemoryPriority=0
bExpandWorkingSet=0
fWorkingSetMaxFraction=0.35
iWorkingSetMinMB=128

[Hardware]
bHardwareProfile=1
bAutoTune=1
bHighEndMode=0
iGameDriveClass=0
bPreferFastCores=0
bPlaceWarmThreadsOnBackgroundCores=1

[WarmCache]
bEnableWarmCache=1
iWarmCacheDelaySecs=60
iWarmCacheMaxFiles=128
iWarmCacheBytesPerFileMB=8
iWarmCacheBudgetMB=512
iWarmCacheThreads=1
bWarmCacheMappedPrefetch=1
bWarmCacheLowIoPriority=1
bWarmCacheStridedPrefetch=1
iWarmCacheStrideMB=256
iWarmCacheReserveMB=0
bStopWarmCacheOnMemoryPressure=1

[DirectStorage]
bDirectStorageProbe=0
bDirectStorageWarmRead=0
iDirectStorageQueueCapacity=128
iDirectStorageBatchMB=32
iDirectStorageTimeoutMs=30000

[Log]
bLogToFile=1
bLogEveryOpen=0
bLogStatsOnExit=0
bLogStatsAfterWarm=1
