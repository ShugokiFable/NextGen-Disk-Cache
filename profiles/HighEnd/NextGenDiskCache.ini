; =============================================================================
; NextGen Disk Cache 1.2.0 - HIGH-END DEFAULT
; Target: X3D / modern hybrid CPU, 32-64+ GB DDR5, fast NVMe SSD
; Modified derivative of Disk Cache Enabler by Archost, uploaded by enpinion.
; =============================================================================

[FileCache]
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
bStripNoBuffering=1
bPreferRandomAccessOnAssets=1
bLeaveSequentialOnLogs=1

[Process]
bDisablePowerThrottling=1
bRaiseMemoryPriority=1
; Disabled: the process working set is not the Windows system file cache.
bExpandWorkingSet=0
fWorkingSetMaxFraction=0.50
iWorkingSetMinMB=128

[Hardware]
bHardwareProfile=1
bAutoTune=1
bHighEndMode=1
; Leave foreground game scheduling to Windows Game Mode/chipset drivers.
bPreferFastCores=0
; Place only warm-cache workers on non-game/background cores when possible.
bPlaceWarmThreadsOnBackgroundCores=1

[WarmCache]
bEnableWarmCache=1
iWarmCacheDelaySecs=12
iWarmCacheMaxFiles=512
iWarmCacheBytesPerFileMB=16
iWarmCacheBudgetMB=0
iWarmCacheThreads=0
bWarmCacheMappedPrefetch=1
bWarmCacheLowIoPriority=1
bWarmCacheStridedPrefetch=1
iWarmCacheStrideMB=256
; 0 = 8 GB reserve on 64 GB+, 4 GB on 32 GB, 2 GB on 16 GB.
iWarmCacheReserveMB=0
bStopWarmCacheOnMemoryPressure=1

[DirectStorage]
bDirectStorageProbe=1
; Real DirectStorage file-to-memory path, but not an OS-page-cache replacement.
bDirectStorageWarmRead=0
iDirectStorageQueueCapacity=128
iDirectStorageBatchMB=64
iDirectStorageTimeoutMs=30000

[Log]
bLogToFile=1
bLogEveryOpen=0
bLogStatsOnExit=0
bLogStatsAfterWarm=1
