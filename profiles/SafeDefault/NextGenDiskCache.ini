; NextGen Disk Cache 2.0.0 - SAFE (recommended, default)
;
; Hooks ONLY the CreateFileA/CreateFileW entries in SkyrimSE.exe's own import
; table. File operations performed by other SKSE plugins never reach this
; plugin. Only existing, synchronous, read-only .bsa/.ba2 opens are rewritten.
; No warm cache, no DirectStorage, no hardware probing, no process-wide tweaks.

[FileCache]
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
; 0 = executable imports only (narrow, recommended). 1 = process-wide Detours.
iHookScope=0
bStripNoBuffering=1
bConservativeHookScope=1
; A caching hint, not a speed switch. Archives only, and only because a BSA is
; read by seeking to internal blocks. Set 0 to strip NO_BUFFERING and nothing else.
bPreferRandomAccessOnArchives=1
bLeaveSequentialOnLogs=1

[Process]
; Process-scoped, but no measured disk-cache benefit - see the Experimental profile.
bDisablePowerThrottling=0
; MEMORY_PRIORITY_NORMAL is already the Windows default; this is a no-op.
bRaiseMemoryPriority=0
bExpandWorkingSet=0
fWorkingSetMaxFraction=0.35
iWorkingSetMinMB=128

[Hardware]
bHardwareProfile=0
bAutoTune=0
bHighEndMode=0
iGameDriveClass=0
bPreferFastCores=0
bPlaceWarmThreadsOnBackgroundCores=0

[WarmCache]
bEnableWarmCache=0
iWarmCacheDelaySecs=60
iWarmCacheMaxFiles=128
iWarmCacheBytesPerFileMB=8
iWarmCacheBudgetMB=512
iWarmCacheThreads=1
bWarmCacheMappedPrefetch=1
bWarmCacheLowIoPriority=1
bWarmCacheStridedPrefetch=1
iWarmCacheStrideMB=256
iWarmCacheReserveMB=0
bStopWarmCacheOnMemoryPressure=1

[DirectStorage]
bDirectStorageProbe=0
bDirectStorageWarmRead=0
iDirectStorageQueueCapacity=128
iDirectStorageBatchMB=32
iDirectStorageTimeoutMs=30000

[Log]
bLogToFile=1
bLogEveryOpen=0
bLogStatsOnExit=0
bLogStatsAfterWarm=1
