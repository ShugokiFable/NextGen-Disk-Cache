; NextGen Disk Cache 1.4.0 - SAFE DEFAULT
; Conservative archive-only file policy. Warm cache and DirectStorage are off.

[FileCache]
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
bStripNoBuffering=1
bConservativeHookScope=1
bPreferRandomAccessOnArchives=1
; Legacy key is still accepted, but this profile uses the precise 1.4 name.
bLeaveSequentialOnLogs=1

[Process]
bDisablePowerThrottling=0
bRaiseMemoryPriority=0
bExpandWorkingSet=0
fWorkingSetMaxFraction=0.35
iWorkingSetMinMB=128

[Hardware]
bHardwareProfile=0
bAutoTune=0
bHighEndMode=0
iGameDriveClass=0
bPreferFastCores=0
bPlaceWarmThreadsOnBackgroundCores=0

[WarmCache]
bEnableWarmCache=0
iWarmCacheDelaySecs=60
iWarmCacheMaxFiles=128
iWarmCacheBytesPerFileMB=8
iWarmCacheBudgetMB=512
iWarmCacheThreads=1
bWarmCacheMappedPrefetch=1
bWarmCacheLowIoPriority=1
bWarmCacheStridedPrefetch=1
iWarmCacheStrideMB=256
iWarmCacheReserveMB=0
bStopWarmCacheOnMemoryPressure=1

[DirectStorage]
bDirectStorageProbe=0
bDirectStorageWarmRead=0
iDirectStorageQueueCapacity=128
iDirectStorageBatchMB=32
iDirectStorageTimeoutMs=30000

[Log]
bLogToFile=1
bLogEveryOpen=0
bLogStatsOnExit=0
bLogStatsAfterWarm=1
