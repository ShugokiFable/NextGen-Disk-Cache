[FileCache]
; Core (Archost): rewrite CreateFile flags so the engine stops disabling the OS disk cache.
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
; Strip FILE_FLAG_NO_BUFFERING (original Disk Cache Enabler main job).
bStripNoBuffering=1
; Prefer FILE_FLAG_RANDOM_ACCESS on game assets (BSA/textures/meshes/plugins…).
bPreferRandomAccessOnAssets=1
; Do not force RANDOM_ACCESS on .log/.tmp (leave sequential if the game asked).
bLeaveSequentialOnLogs=1

[Process]
; Windows 10+ EcoQoS can throttle background-classified work — disable for Skyrim.
bDisablePowerThrottling=1
; Ask Windows to treat our pages as normal priority (stable residency).
bRaiseMemoryPriority=1
; Soft-expand process working-set limits so more of the OS page cache can stick
; to this process on high-RAM PCs. Does NOT lock pages or steal all RAM.
bExpandWorkingSet=1
; Max working set as a fraction of physical RAM (clamped 0.10–0.75).
fWorkingSetMaxFraction=0.50
; Soft minimum working set in MB (0 = leave OS default).
iWorkingSetMinMB=128

[WarmCache]
; After a short delay, sequentially read the head of large Data\ archives so the
; OS disk cache (and your SSD's own DRAM cache behind it) is hot before travel.
; Low-priority thread; disable if you hate any background I/O after launch.
bEnableWarmCache=1
iWarmCacheDelaySecs=8
iWarmCacheMaxFiles=256
iWarmCacheBytesPerFileMB=8

[Log]
bLogToFile=1
; Documents\My Games\Skyrim Special Edition\SKSE\NextGenDiskCache.log
bLogEveryOpen=0
bLogStatsOnExit=1
