[FileCache]
; Core (Archost): rewrite CreateFile flags so the engine stops disabling the OS disk cache.
bEnableFileCacheHooks=1
bEnableCreateFileA=1
bEnableCreateFileW=1
; Strip FILE_FLAG_NO_BUFFERING (original Disk Cache Enabler main job).
bStripNoBuffering=1
; Prefer FILE_FLAG_RANDOM_ACCESS on game assets (BSA/textures/meshes/plugins…).
bPreferRandomAccessOnAssets=1
; Do not force RANDOM_ACCESS on .log/.tmp (leave sequential if the game asked).
bLeaveSequentialOnLogs=1

[Process]
; Windows 10+ EcoQoS can throttle background-classified work — disable for Skyrim.
bDisablePowerThrottling=1
; Ask Windows to treat our pages as normal priority (stable residency).
bRaiseMemoryPriority=1
; Soft-expand process working-set limits so more of the OS page cache can stick
; to this process on high-RAM PCs. Does NOT lock pages or steal all RAM.
bExpandWorkingSet=1
; Max working set as a fraction of physical RAM (clamped 0.10–0.75).
fWorkingSetMaxFraction=0.50
; Soft minimum working set in MB (0 = leave OS default).
iWorkingSetMinMB=128

[Hardware]
; NEW in 1.1.0. Detect at startup and write to the log:
;   CPU     — brand, cores, L3 cache topology, X3D (3D V-Cache), hybrid P/E
;   RAM     — total, DDR generation + running speed in MT/s (SMBIOS)
;             (CAS timings like CL30 live in SPD — not readable from user mode)
;   Drive   — the game drive: NVMe SSD / SATA SSD / HDD (seek-penalty probe)
;   GPU     — largest PCI BAR size → Resizable BAR ACTIVE / OFF verdict
;   OS      — real Windows build (RtlGetVersion)
; Detection only reads — nothing on your system is changed by it.
; ReBAR / XMP / EXPO / X3D are BIOS or silicon: this plugin detects and ADAPTS
; to them (see bAutoTune); it cannot switch them on. The log tells you if
; something looks off (e.g. DDR5 stuck at JEDEC 4800, BAR still 256 MB).
bHardwareProfile=1
; Let the profile scale the warm cache automatically:
;   budget   — 8 GB on 64 GB+ RAM, 4 GB on 32 GB, 1.5 GB on 16 GB, 512 MB below
;              (always capped to 1/4 of the RAM that is FREE at warm time;
;               HDDs are capped to 256 MB so they don't grind)
;   threads  — NVMe 4 / SATA SSD 2 / HDD 1  (NVMe drives love queue depth)
;   per-file — NVMe 64 MB / SATA 32 MB / HDD 8 MB head of each archive
bAutoTune=1
; OPT-IN, default OFF. On dual-CCD X3D CPUs (7900X3D/7950X3D/9950X3D) prefer
; the V-Cache CCD; on Intel hybrid CPUs prefer P-cores — via process default
; CPU sets (a soft scheduler hint, NOT an affinity lock). Windows + chipset
; drivers usually already handle this; turn on only to test. Single-CCD X3D
; (5800X3D/7800X3D/9800X3D) needs nothing — the whole CPU is V-Cache.
bPreferFastCores=0

[WarmCache]
; After a short delay, pre-read the biggest Data\ archives so the OS disk
; cache (and your SSD's own DRAM/SLC cache behind it) is hot before you travel.
; Runs at lowest thread priority + low I/O priority; game I/O always wins.
bEnableWarmCache=1
iWarmCacheDelaySecs=8
iWarmCacheMaxFiles=256
; Per-file cap in MB. With bAutoTune=1 this is the floor; NVMe/SATA raise it.
iWarmCacheBytesPerFileMB=8
; Total warm budget in MB. 0 = auto (see bAutoTune). Set a number to force it.
iWarmCacheBudgetMB=0
; Parallel warm readers. 0 = auto (NVMe 4 / SATA SSD 2 / HDD 1).
iWarmCacheThreads=0
; NEW: warm via MapViewOfFile + PrefetchVirtualMemory (Win8+) — the kernel
; fetches optimally sized runs instead of a 1 MB ReadFile loop. Falls back to
; the read loop automatically on older Windows.
bWarmCacheMappedPrefetch=1
; Tag warm-read file handles IoPriorityHintLow so foreground loads outrank them.
bWarmCacheLowIoPriority=1

[Log]
bLogToFile=1
; Documents\My Games\Skyrim Special Edition\SKSE\NextGenDiskCache.log
bLogEveryOpen=0
bLogStatsOnExit=1
